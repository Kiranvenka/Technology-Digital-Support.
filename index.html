      try {

      } catch (error) {
        return fallback;
      }
    }

    function safeStorageSet(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch (error) {
        return false;
      }
      return true;
    }

    function MetricCounter({ target, suffix = "", label, icon }) {
      const [value, setValue] = useState(0);
      const ref = useRef(null);
      useEffect(() => {
        const node = ref.current;
        const observer = new IntersectionObserver(([entry]) => {
          if (!entry.isIntersecting) return;
          let start = null;
          const duration = 1200;
          function tick(timestamp) {
            if (!start) start = timestamp;
            const progress = Math.min((timestamp - start) / duration, 1);
            setValue(Math.round(target * (1 - Math.pow(1 - progress, 3))));
            if (progress < 1) requestAnimationFrame(tick);
          }
          requestAnimationFrame(tick);
          observer.disconnect();
        }, { threshold: .35 });
        observer.observe(node);
        return () => observer.disconnect();
      }, [target]);

      return (
        <div ref={ref} className="glass shine rounded-lg p-5 shadow-xl shadow-blue-900/5 dark:shadow-cyan-500/5">
          <div className="flex items-center gap-3">

              <p className="text-sm font-semibold text-slate-600 dark:text-slate-300">{label}</p>
            </div>
          </div>
        </div>
      );

                borderWidth: 1,
                borderRadius: 8
              }
            ]
          },
          options: {
            responsive: true,

              legend: { labels: { color: dark ? "#e2e8f0" : "#0f172a", font: { weight: 700 } } },
              tooltip: {

          {selected !== null && (
            <div className="fixed inset-0 z-[70] grid place-items-center bg-slate-950/80 p-4 backdrop-blur-md" onClick={() => setSelected(null)}>
              <div className="relative w-full max-w-6xl overflow-hidden rounded-lg bg-white shadow-2xl dark:bg-[#151D30]" onClick={(event) => event.stopPropagation()}>
                <div className="relative bg-slate-950">
                  <button className="absolute right-4 top-4 z-10 grid h-10 w-10 place-items-center rounded-lg bg-slate-950/70 text-white backdrop-blur-md transition hover:bg-slate-900" onClick={() => setSelected(null)} aria-label="Close gallery">
                    <i className="fa-solid fa-xmark"></i>
                  </button>
                  <img src={gallery[selected].image} alt={gallery[selected].title} className="max-h-[76vh] w-full object-contain" />
                </div>
                <div className="p-6">
                  <span className="rounded-full bg-cyan-100 px-3 py-1 text-xs font-black text-academic-800 dark:bg-cyan-300 dark:text-slate-950">{gallery[selected].tag}</span>
                  <h3 className="mt-4 font-display text-3xl font-black text-academic-900 dark:text-white">{gallery[selected].title}</h3>
                  <p className="mt-2 text-lg font-semibold text-slate-700 dark:text-slate-200">{gallery[selected].caption}</p>
                </div>
              </div>
            </div>
          )}
        </section>
      );
    }

    function Impact() {
      return (
        <section className="section-pad bg-slate-50 dark:bg-[#101827]">
          <div className="mx-auto max-w-7xl px-4">
            <div className="grid gap-4 md:grid-cols-4">
              <MetricCounter target={90} suffix="%+" label="Digital confidence" icon="fa-face-smile" />
              <MetricCounter target={80} suffix="%+" label="Active banking usage" icon="fa-building-columns" />
              <MetricCounter target={85} suffix="%+" label="Online portal usage" icon="fa-globe" />
              <MetricCounter target={150} suffix="+" label="Households enabled" icon="fa-people-group" />
            </div>
          </div>
        </section>
      );
    }

    function Team() {
      return (
        <section id="team" className="section-pad bg-white dark:bg-[#0B0F19]">
          <div className="mx-auto max-w-7xl px-4">
            <p className="text-sm font-black uppercase tracking-widest text-cyan-600 dark:text-cyan-300">Project Team</p>
            <h2 className="mt-3 font-display text-4xl font-black text-academic-900 dark:text-white">ECE student team and guides.</h2>
            <div className="mt-10 grid gap-5 sm:grid-cols-2 lg:grid-cols-4">
              {team.map(([name, role, detail, initial, gradient]) => (
                <div key={name} className="glass rounded-lg p-5 text-center transition hover:-translate-y-2">
                  <div className={`mx-auto grid h-24 w-24 place-items-center rounded-lg bg-gradient-to-br ${gradient} text-4xl font-black text-white shadow-xl`}>
                    {initial}
                  </div>
                  <h3 className="mt-5 font-display text-xl font-extrabold text-academic-900 dark:text-white">{name}</h3>
                  <p className="mt-1 text-sm font-black text-cyan-600 dark:text-cyan-300">{role}</p>
                  <p className="mt-3 text-sm leading-6 text-slate-600 dark:text-slate-300">{detail}</p>
                  <div className="mt-5 flex justify-center gap-2 text-slate-500 dark:text-slate-300">
                    <span className="grid h-9 w-9 place-items-center rounded-lg bg-slate-100 dark:bg-white/10"><i className="fa-brands fa-linkedin-in"></i></span>
                    <span className="grid h-9 w-9 place-items-center rounded-lg bg-slate-100 dark:bg-white/10"><i className="fa-solid fa-envelope"></i></span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Contact() {
      const [form, setForm] = useState({ name: "", email: "", phone: "", query: "" });
      const [status, setStatus] = useState(null);

      function update(field, value) {
        setForm(prev => ({ ...prev, [field]: value }));
      }

      function submit(event) {
        event.preventDefault();
        const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email);
        const phoneOk = /^[0-9]{10}$/.test(form.phone.replace(/\D/g, ""));
        if (!form.name.trim() || !emailOk || !phoneOk || form.query.trim().length < 10) {
          setStatus({ type: "error", text: "Please enter a name, valid email, 10-digit phone number, and a query of at least 10 characters." });
          return;
        }
        const subject = encodeURIComponent("CSP Digital Support Request");
        const body = encodeURIComponent(
          `Name: ${form.name}\nEmail: ${form.email}\nPhone: ${form.phone}\n\nQuery:\n${form.query}`
        );
        window.location.href = `mailto:vk081251@gmail.com?subject=${subject}&body=${body}`;
        setStatus({ type: "success", text: "Your email app has been opened with the support request addressed to vk081251@gmail.com." });
        setForm({ name: "", email: "", phone: "", query: "" });
      }

      return (
        <section id="contact" className="section-pad bg-slate-950 text-white">
          <div className="mx-auto grid max-w-7xl gap-8 px-4 lg:grid-cols-[.8fr_1.2fr]">
            <div>
              <p className="text-sm font-black uppercase tracking-widest text-cyan-300">Contact & Queries</p>
              <h2 className="mt-3 font-display text-4xl font-black">Digital support desk.</h2>
              <p className="mt-5 leading-8 text-slate-300">Use this academic query form to send a community support request to the CSP team email.</p>
              <div className="mt-8 grid gap-4">
                <p className="font-bold"><i className="fa-solid fa-location-dot mr-3 text-cyan-300"></i>Gates Institute of Technology, Gooty, Andhra Pradesh</p>
                <p className="font-bold"><i className="fa-solid fa-building-columns mr-3 text-cyan-300"></i>Department of Electronics and Communication Engineering</p>
                <p className="font-bold"><i className="fa-solid fa-calendar-days mr-3 text-cyan-300"></i>CSP Field Period: 14/04/2026 to 07/06/2026</p>
              </div>
            </div>
            <form onSubmit={submit} className="rounded-lg border border-white/10 bg-white/10 p-5 backdrop-blur-md">
              <div className="grid gap-4 sm:grid-cols-2">
                <label className="grid gap-2 text-sm font-bold">
                  Name
                  <input value={form.name} onChange={e => update("name", e.target.value)} className="rounded-lg border border-white/10 bg-slate-950/60 px-4 py-3 text-white outline-none ring-cyan-300 transition focus:ring-2" placeholder="Your name" />
                </label>
                <label className="grid gap-2 text-sm font-bold">
                  Email
                  <input value={form.email} onChange={e => update("email", e.target.value)} className="rounded-lg border border-white/10 bg-slate-950/60 px-4 py-3 text-white outline-none ring-cyan-300 transition focus:ring-2" placeholder="name@example.com" />
                </label>
                <label className="grid gap-2 text-sm font-bold sm:col-span-2">
                  Phone
                  <input value={form.phone} onChange={e => update("phone", e.target.value)} className="rounded-lg border border-white/10 bg-slate-950/60 px-4 py-3 text-white outline-none ring-cyan-300 transition focus:ring-2" placeholder="10-digit mobile number" />
                </label>
                <label className="grid gap-2 text-sm font-bold sm:col-span-2">
                  Query
                  <textarea value={form.query} onChange={e => update("query", e.target.value)} rows="5" className="resize-none rounded-lg border border-white/10 bg-slate-950/60 px-4 py-3 text-white outline-none ring-cyan-300 transition focus:ring-2" placeholder="Describe the digital support needed"></textarea>
                </label>
              </div>
              <button className="mt-5 w-full rounded-lg bg-cyan-300 px-5 py-3 font-black text-slate-950 transition hover:-translate-y-1" disabled={status?.type === "loading"}>
                {status?.type === "loading" ? "Submitting..." : "Submit Support Request"}
              </button>
              {status && (
                <div className={cx(
                  "mt-4 rounded-lg p-4 text-sm font-bold",
                  status.type === "success" && "bg-emerald-400/15 text-emerald-200",
                  status.type === "error" && "bg-red-400/15 text-red-200",
                  status.type === "loading" && "bg-cyan-400/15 text-cyan-200"
                )}>{status.text}</div>
              )}
            </form>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="border-t border-white/10 bg-slate-950 px-4 py-8 text-center text-sm font-semibold text-slate-400">
          <p>Technology & Digital Support CSP | Gates Institute of Technology | Department of ECE</p>
        </footer>
      );
    }

    function App() {
      const [theme, setTheme] = useTheme();
      const [activeSection, setActiveSection] = useState("home");
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      useEffect(() => {
        const sections = navItems.map(([id]) => document.getElementById(id)).filter(Boolean);
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) setActiveSection(entry.target.id);
          });
        }, { threshold: .28, rootMargin: "-20% 0px -55% 0px" });
        sections.forEach(section => observer.observe(section));
        return () => observer.disconnect();
      }, []);

      return (
        <div className="min-h-screen overflow-x-hidden bg-slate-50 text-slate-950 dark:bg-[#0B0F19] dark:text-slate-100">
          <Navigation activeSection={activeSection} theme={theme} setTheme={setTheme} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenuOpen} />
          <main>
            <Hero />
            <About />
            <Objectives />
            <Timeline />
            <Survey theme={theme} />
            <Modules />
            <Flow />
            <Gallery />
            <Impact />
            <Team />
            <Contact />
          </main>
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
